services:
  mysql:
    image: mysql:8.0
    container_name: healthsync-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: medical_db
      MYSQL_USER: devuser
      MYSQL_PASSWORD: devpass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql   # ✅ Named volume (best for cross-platform)
    restart: unless-stopped

volumes:
  mysql_data: